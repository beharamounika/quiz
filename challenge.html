<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Challenge</title>
</head>

<body>
    <h1>Test your Knowledge!</h1>
    <form>
        <fieldset>
            <label>1. If you rearrange the letters "LEPA", you get the name of a:</label>
            <br>
            <input type="radio" id="q1_option1" name="q1_options">
            <label for="q1_option1">Country</label>
            <input type="radio" id="q1_option2" name="q1_options">
            <label for="q1_option2">Fruit</label>
            <input type="radio" id="q1_option3" name="q1_options">
            <label for="q1_option3">Animal</label>
            <input type="radio" id="q1_option4" name="q1_options">
            <label for="q1_option4">City</label>
            <br><br>

            <label>2. Which number should replace the question mark? 3, 9, 27, ?, 243</label>
            <br>
            <input type="radio" id="q2_option1" name="q2_options">
            <label for="q2_option1">54</label>
            <input type="radio" id="q2_option2" name="q2_options">
            <label for="q2_option2">81</label>
            <input type="radio" id="q2_option3" name="q2_options">
            <label for="q2_option3">72</label>
            <input type="radio" id="q2_option4" name="q2_options">
            <label for="q2_option4">90</label>
            <br><br>

            <label>3. I am an odd number. Take away one letter and I become even. What number am I?</label>
            <br>
            <input type="radio" id="q3_option1" name="q3_options">
            <label for="q3_option1">Five</label>
            <input type="radio" id="q3_option2" name="q3_options">
            <label for="q3_option2">Seven</label>
            <input type="radio" id="q3_option3" name="q3_options">
            <label for="q3_option3">Nine</label>
            <input type="radio" id="q3_option4" name="q3_options">
            <label for="q3_option4">Eleven</label>
            <br><br>

            <label>4. Which one of the following doesn't belong in the group?</label>
            <br>
            <input type="radio" id="q4_option1" name="q4_options">
            <label for="q4_option1">Apple</label>
            <input type="radio" id="q4_option2" name="q4_options">
            <label for="q4_option2">Banana</label>
            <input type="radio" id="q4_option3" name="q4_options">
            <label for="q4_option3">Grapes</label>
            <input type="radio" id="q4_option4" name="q4_options">
            <label for="q4_option4">Carrot</label>
            <br><br>

            <label>5. If BIRD is coded as 3179, how would you code FISH?</label>
            <br>
            <input type="radio" id="q5_option1" name="q5_options">
            <label for="q5_option1">6985</label>
            <input type="radio" id="q5_option2" name="q5_options">
            <label for="q5_option2">6581</label>
            <input type="radio" id="q5_option3" name="q5_options">
            <label for="q5_option3">6915</label>
            <input type="radio" id="q5_option4" name="q5_options">
            <label for="q5_option4">6715</label>
            <br><br>

            <label>6. What number comes next in the series: 1, 4, 9, 16, 25, ...?</label>
            <br>
            <input type="radio" id="q6_option1" name="q6_options">
            <label for="q6_option1">30</label>
            <input type="radio" id="q6_option2" name="q6_options">
            <label for="q6_option2">32</label>
            <input type="radio" id="q6_option3" name="q6_options">
            <label for="q6_option3">35</label>
            <input type="radio" id="q6_option4" name="q6_options">
            <label for="q6_option4">36</label>
            <br><br>

            <label>7. A clock shows the time as 3:15. What is the angle between the hour and the minute hands?</label>
            <br>
            <input type="radio" id="q7_option1" name="q7_options">
            <label for="q7_option1">0 degrees</label>
            <input type="radio" id="q7_option2" name="q7_options">
            <label for="q7_option2">7.5 degrees</label>
            <input type="radio" id="q7_option3" name="q7_options">
            <label for="q7_option3">22.5 degrees</label>
            <input type="radio" id="q7_option4" name="q7_options">
            <label for="q7_option4">30 degrees</label>
            <br><br>

            <label>8. Which word can be added to the beginning of the following words to create new words: LIGHT, BREAK,
                TIME, BOARD?</label>
            <br>
            <input type="radio" id="q8_option1" name="q8_options">
            <label for="q8_option1">Day</label>
            <input type="radio" id="q8_option2" name="q8_options">
            <label for="q8_option2">Night</label>
            <input type="radio" id="q8_option3" name="q8_options">
            <label for="q8_option3">Sun</label>
            <input type="radio" id="q8_option4" name="q8_options">
            <label for="q8_option4">Black</label>
            <br><br>
            <label>9. What comes next in the sequence: 2, 6, 12, 20, ...?</label>
            <br>
            <input type="radio" id="q9_option1" name="q9_options">
            <label for="q9_option1">30</label>
            <input type="radio" id="q9_option2" name="q9_options">
            <label for="q9_option2">28</label>
            <input type="radio" id="q9_option3" name="q9_options">
            <label for="q9_option3">36</label>
            <input type="radio" id="q9_option4" name="q9_options">
            <label for="q9_option4">40</label>
            <br><br>

            <label>10. You see me once in June, twice in November, and not at all in May. What am I?</label>
            <br>
            <input type="radio" id="q10_option1" name="q10_options">
            <label for="q10_option1">The letter E</label>
            <input type="radio" id="q10_option2" name="q10_options">
            <label for="q10_option2">The number 2</label>
            <input type="radio" id="q10_option3" name="q10_options">
            <label for="q10_option3">The moon</label>
            <input type="radio" id="q10_option4" name="q10_options">
            <label for="q10_option4">The Sun</label>
            <br><br>

            <label>11. What is full of holes but still holds water?</label>
            <br>
            <input type="radio" id="q11_option1" name="q11_options">
            <label for="q11_option1">Sponge</label>
            <input type="radio" id="q11_option2" name="q11_options">
            <label for="q11_option2">Strainer</label>
            <input type="radio" id="q11_option3" name="q11_options">
            <label for="q11_option3">Net</label>
            <input type="radio" id="q11_option4" name="q11_options">
            <label for="q11_option4">Bucket</label>
            <br><br>

            <label>12. What has keys but can't open locks?</label>
            <br>
            <input type="radio" id="q12_option1" name="q12_options">
            <label for="q12_option1">Piano</label>
            <input type="radio" id="q12_option2" name="q12_options">
            <label for="q12_option2">Keyboard</label>
            <input type="radio" id="q12_option3" name="q12_options">
            <label for="q12_option3">Map</label>
            <input type="radio" id="q12_option4" name="q12_options">
            <label for="q12_option4">Calculator</label>
            <br><br>

            <label>13. What comes once in a minute, twice in a moment, but never in a thousand years?</label>
            <br>
            <input type="radio" id="q13_option1" name="q13_options">
            <label for="q13_option1">The letter "M"</label>
            <input type="radio" id="q13_option2" name="q13_options">
            <label for="q13_option2">The number "1"</label>
            <input type="radio" id="q13_option3" name="q13_options">
            <label for="q13_option3">The word "now"</label>
            <input type="radio" id="q13_option4" name="q13_options">
            <label for="q13_option4">The word "once"</label>
            <br><br>

            <label>14. What can travel around the world while staying in a corner?</label>
            <br>
            <input type="radio" id="q14_option1" name="q14_options">
            <label for="q14_option1">Stamps</label>
            <input type="radio" id="q14_option2" name="q14_options">
            <label for="q14_option2">Map</label>
            <input type="radio" id="q14_option3" name="q14_options">
            <label for="q14_option3">Postcard</label>
            <input type="radio" id="q14_option4" name="q14_options">
            <label for="q14_option4">Envelope</label>
            <br><br>

            <label>15. I speak without a mouth and hear without ears. I have no body, but I come alive with wind. What
                am I?</label>
            <br>
            <input type="radio" id="q19_option1" name="q19_options">
            <label for="q19_option1">Echo</label>
            <input type="radio" id="q19_option2" name="q19_options">
            <label for="q19_option2">Whistle</label>
            <input type="radio" id="q19_option3" name="q19_options">
            <label for="q19_option3">Thunder</label>
            <input type="radio" id="q19_option4" name="q19_options">
            <label for="q19_option4">Voice</label>
            <br><br>

          
        </fieldset>
        <br>
        <button type="submit">Submit</button>
    </form>
</body>

</html>
